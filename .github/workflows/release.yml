name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          current=$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          new_version="$major.$minor.$((patch + 1))"
          sed -i "0,/^version = \".*\"/s//version = \"$new_version\"/" Cargo.toml
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release

      - name: Commit version bump and tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release v${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            target/release/plutonium.exe \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
